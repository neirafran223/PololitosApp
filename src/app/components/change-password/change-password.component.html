<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Cambiar Contraseña</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <lucide-icon name="x" size="24"></lucide-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="password-form">
    
    <div class="form-section">
      <p class="instruction-text">
        Ingresa tu contraseña actual y la nueva contraseña que deseas utilizar.
      </p>

      <ion-item lines="none" class="form-item" [class.error]="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched">
        <lucide-icon name="lock" slot="start" size="20"></lucide-icon>
        <ion-label position="stacked">Contraseña Actual</ion-label>
        <ion-input formControlName="currentPassword" type="password" placeholder="********"></ion-input>
      </ion-item>
      <div class="error-message" *ngIf="passwordForm.get('currentPassword')?.hasError('required') && passwordForm.get('currentPassword')?.touched">
        Debes ingresar tu contraseña actual.
      </div>

      <ion-item lines="none" class="form-item" [class.error]="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched">
        <lucide-icon name="key" slot="start" size="20"></lucide-icon>
        <ion-label position="stacked">Nueva Contraseña</ion-label>
        <ion-input formControlName="newPassword" type="password" placeholder="Mínimo 6 caracteres"></ion-input>
      </ion-item>
      <div class="error-message" *ngIf="passwordForm.get('newPassword')?.hasError('minlength') && passwordForm.get('newPassword')?.touched">
        La contraseña debe tener al menos 6 caracteres.
      </div>

      <ion-item lines="none" class="form-item" [class.error]="passwordForm.hasError('notSame') && passwordForm.get('confirmPassword')?.touched">
        <lucide-icon name="check-circle" slot="start" size="20"></lucide-icon>
        <ion-label position="stacked">Confirmar Nueva Contraseña</ion-label>
        <ion-input formControlName="confirmPassword" type="password" placeholder="Repite la nueva contraseña"></ion-input>
      </ion-item>
      <div class="error-message" *ngIf="passwordForm.hasError('notSame') && passwordForm.get('confirmPassword')?.touched">
        Las contraseñas no coinciden.
      </div>

    </div>

    <ion-button expand="block" type="submit" [disabled]="passwordForm.invalid || isLoading" class="submit-btn">
      <span *ngIf="!isLoading">Actualizar Contraseña</span>
      <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
    </ion-button>

  </form>
</ion-content>
