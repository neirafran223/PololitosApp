<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()" fill="clear">
        <lucide-icon name="x" size="24"></lucide-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Cambiar Contraseña</ion-title>
    <ion-buttons slot="end">
      <ion-button 
        (click)="save()" 
        [disabled]="isChanging || changePasswordForm.invalid" 
        [strong]="true" 
        fill="clear">
        <span *ngIf="!isChanging">Guardar</span>
        <ion-spinner *ngIf="isChanging" name="crescent" style="width: 20px; height: 20px;"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="change-password-content">
  <form *ngIf="changePasswordForm" [formGroup]="changePasswordForm" class="change-password-form">
    
    <div class="form-section">
      <h3 class="section-title">Seguridad</h3>
      
      <ion-item class="form-item" [class.error]="changePasswordForm.get('currentPassword')?.invalid && changePasswordForm.get('currentPassword')?.touched">
        <lucide-icon name="lock" slot="start"></lucide-icon>
        <ion-input 
          formControlName="currentPassword" 
          label="Contraseña Actual" 
          labelPlacement="stacked"
          [type]="showCurrentPassword ? 'text' : 'password'"
          placeholder="Ingresa tu contraseña actual"
          [clearOnEdit]="false">
        </ion-input>
        <ion-icon 
          [name]="showCurrentPassword ? 'eye-off-outline' : 'eye-outline'" 
          slot="end" 
          (click)="togglePasswordVisibility('current')"
          style="cursor: pointer;">
        </ion-icon>
      </ion-item>
      <div class="error-message" *ngIf="changePasswordForm.get('currentPassword')?.invalid && changePasswordForm.get('currentPassword')?.touched">
        {{ getFieldError('currentPassword') }}
      </div>

      <ion-item class="form-item" [class.error]="changePasswordForm.get('newPassword')?.invalid && changePasswordForm.get('newPassword')?.touched">
        <lucide-icon name="key" slot="start"></lucide-icon>
        <ion-input 
          formControlName="newPassword" 
          label="Nueva Contraseña" 
          labelPlacement="stacked"
          [type]="showNewPassword ? 'text' : 'password'"
          placeholder="Mínimo 6 caracteres"
          [clearOnEdit]="false">
        </ion-input>
        <ion-icon 
          [name]="showNewPassword ? 'eye-off-outline' : 'eye-outline'" 
          slot="end" 
          (click)="togglePasswordVisibility('new')"
          style="cursor: pointer;">
        </ion-icon>
      </ion-item>
      <div class="error-message" *ngIf="changePasswordForm.get('newPassword')?.invalid && changePasswordForm.get('newPassword')?.touched">
        {{ getFieldError('newPassword') }}
      </div>

      <ion-item class="form-item" [class.error]="changePasswordForm.get('confirmPassword')?.invalid && changePasswordForm.get('confirmPassword')?.touched">
        <lucide-icon name="check" slot="start"></lucide-icon>
        <ion-input 
          formControlName="confirmPassword" 
          label="Confirmar Nueva Contraseña" 
          labelPlacement="stacked"
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirma tu nueva contraseña"
          [clearOnEdit]="false">
        </ion-input>
        <ion-icon 
          [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'" 
          slot="end" 
          (click)="togglePasswordVisibility('confirm')"
          style="cursor: pointer;">
        </ion-icon>
      </ion-item>
      <div class="error-message" *ngIf="changePasswordForm.get('confirmPassword')?.invalid && changePasswordForm.get('confirmPassword')?.touched">
        {{ getFieldError('confirmPassword') }}
      </div>
      <div class="error-message" *ngIf="changePasswordForm.hasError('passwordsMismatch') && changePasswordForm.get('confirmPassword')?.touched">
        Las contraseñas no coinciden
      </div>
    </div>

    <div class="password-requirements">
      <h4>Requisitos de contraseña:</h4>
      <ul>
        <li>Mínimo 6 caracteres</li>
        <li>Debe ser diferente a la contraseña actual</li>
      </ul>
    </div>

  </form>
</ion-content>
